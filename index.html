<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>答え合わせ時 容疑者別エンディング</title>
    <style>
        body {
            background-color: #111;
            color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
        }
        .alert-text {
            color: #ff4d4d;
            font-size: 0.9rem;
            margin-bottom: 30px;
            padding: 0 10px;
        }
        /* 動画を並べるコンテナ */
        .video-gallery {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 15px;
        }
        /* 各動画のカード枠 */
        .video-card {
            background-color: #1e1e1e;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .video-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 12px;
            text-align: left;
            border-left: 4px solid #00adb5;
            padding-left: 10px;
        }
        video {
            width: 100%;
            border-radius: 6px;
            background-color: #000;
            /* 長押しメニューの禁止（スマホ対策） */
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
    </style>
</head>
<body>

    <h1>金色の魔獅皇　答え合わせ時 容疑者別エンディング</h1>
    <p class="alert-text">※本動画はサイト内での視聴のみ許可されています。
※本動画の録画・ダウンロード・無断転載は固く禁止しています。個人の使用を超える不適切な行為が確認された場合、然るべき機関に通報し厳正に対処します。</p>

    <div class="video-gallery">

        <div class="video-card">
            <div class="video-title">動画①</div>
            <video src="koshi.mp4" controls controlslist="nodownload" oncontextmenu="return false;"></video>
        </div>

        <div class="video-card">
            <div class="video-title">動画②</div>
            <video src="yatsu.mp4" controls controlslist="nodownload" oncontextmenu="return false;"></video>
        </div>

        <div class="video-card">
            <div class="video-title">動画③</div>
            <video src="naka.mp4" controls controlslist="nodownload" oncontextmenu="return false;"></video>
        </div>

        <div class="video-card">
            <div class="video-title">動画④</div>
            <video src="bayashi.mp4" controls controlslist="nodownload" oncontextmenu="return false;"></video>
        </div>

    </div>

    <script>
        // ページ全体の右クリック（長押しメニュー）を禁止
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });

        // キーボードショートカット（保存など）を制限
        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
            }
            if (e.key === 'F12') {
                e.preventDefault();
            }
        });
    </script>

</body>
</html>
